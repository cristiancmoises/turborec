name: Windows asset

# Build the Windows .exe and attach it to an existing release, on demand.
# release.yml already builds the .exe for every new tag; this manual workflow
# exists to (re)attach a Windows binary to an already-published tag without
# re-tagging (e.g. when a prior run's Windows job needed a fix).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build from and attach the .exe to (e.g. v3.6.0)
        required: true
        default: v3.6.0

permissions:
  contents: write

jobs:
  windows:
    name: Build + attach Windows executable
    runs-on: windows-latest
    steps:
      - name: Checkout the tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch + verify a pinned static FFmpeg to bundle
        shell: bash
        env:
          FFMPEG_URL: https://github.com/GyanD/codexffmpeg/releases/download/8.1.2/ffmpeg-8.1.2-essentials_build.zip
          FFMPEG_SHA256: db580001caa24ac104c8cb856cd113a87b0a443f7bdf47d8c12b1d740584a2ec
        run: |
          set -eu
          curl -L --retry 3 -o ffmpeg.zip "$FFMPEG_URL"
          echo "${FFMPEG_SHA256}  ffmpeg.zip" | sha256sum -c -
          7z x -y ffmpeg.zip >/dev/null
          cp "$(find . -type f -name ffmpeg.exe  | head -1)" ffmpeg.exe
          cp "$(find . -type f -name ffprobe.exe | head -1)" ffprobe.exe
          ./ffmpeg.exe -version | head -1

      - name: Build a self-contained .exe (ffmpeg bundled) with PyInstaller
        shell: bash
        run: |
          set -eu
          python -m pip install --upgrade pip && python -m pip install "pyinstaller==6.21.0"
          pyinstaller --onefile --name turborec \
            --collect-submodules tkinter --hidden-import tkinter \
            --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." \
            turborec.py
          # Byte-safe version read (turborec.py has UTF-8 glyphs that Windows'
          # default cp1252 text mode can't decode).
          VER=$(sed -n 's/^VERSION = "\(.*\)"/\1/p' turborec.py | head -1)
          mkdir -p out
          cp dist/turborec.exe "out/Turbo_Recorder-${VER}-windows-x64.exe"
          ls -l out

      - name: Smoke-test the executable (must find its bundled ffmpeg)
        shell: bash
        run: |
          set -eu
          ./dist/turborec.exe --version
          ./dist/turborec.exe detect | grep -i ffmpeg

      - name: Attach the .exe to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: out/*.exe
          fail_on_unmatched_files: true
