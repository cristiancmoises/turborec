name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux packages + portable tarball
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packaging tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev rpm fakeroot libfuse2 wget \
            librsvg2-bin desktop-file-utils imagemagick

      - name: Build packages
        env:
          # build-appimage.sh self-downloads a pinned appimagetool and runs it
          # with --appimage-extract-and-run, so no FUSE is required on the runner.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          chmod +x packaging/build-*.sh
          packaging/build-deb.sh
          packaging/build-rpm.sh
          packaging/build-appimage.sh
          # Architecture-independent tarball — installs on any Unix (incl. the BSDs).
          packaging/build-tarball.sh

      - name: Collect artifacts
        run: |
          mkdir -p dist
          # Exclude the downloaded appimagetool itself (it is an *.AppImage too).
          find . -path ./dist -prune -o \
            \( -name '*.deb' -o -name '*.rpm' -o -iname '*.AppImage' \) \
            ! -iname 'appimagetool*' -type f -print -exec cp -f {} dist/ \;
          echo "Artifacts:"
          ls -l dist

      - name: Publish Linux artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true

  freebsd:
    name: Build FreeBSD package
    runs-on: ubuntu-latest
    needs: linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build + smoke-test the FreeBSD .pkg in a FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          # python3 is needed both to read VERSION cleanly and to smoke-test the
          # installed package; pkg(8) itself is part of the base FreeBSD image.
          prepare: |
            pkg install -y python3
          run: |
            set -eu
            sh packaging/build-freebsd-pkg.sh
            echo "== smoke test: install the built package =="
            pkg add -f dist/turborec-*.pkg
            turborec --version
            pkg delete -y turborec

      - name: Publish FreeBSD artifact to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.pkg
          fail_on_unmatched_files: true

  windows:
    name: Build Windows executable
    runs-on: windows-latest
    needs: linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build a single-file .exe with PyInstaller
        shell: bash
        run: |
          set -eu
          python -m pip install --upgrade pip pyinstaller
          # tkinter is imported lazily inside the GUI, so collect it explicitly.
          pyinstaller --onefile --name turborec \
            --collect-submodules tkinter --hidden-import tkinter \
            turborec.py
          # Byte-safe version read (turborec.py has UTF-8 glyphs that Windows'
          # default cp1252 text mode can't decode).
          VER=$(sed -n 's/^VERSION = "\(.*\)"/\1/p' turborec.py | head -1)
          mkdir -p out
          cp dist/turborec.exe "out/Turbo_Recorder-${VER}-windows-x64.exe"
          ls -l out

      - name: Smoke-test the executable
        shell: bash
        run: ./dist/turborec.exe --version

      - name: Publish Windows artifact to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.exe
          fail_on_unmatched_files: true

  guix:
    name: Build GNU Guix relocatable pack
    runs-on: ubuntu-latest
    needs: linux
    # Best-effort: Guix bootstrap in CI is heavy; never let it block the release.
    # The canonical Guix artifact is guix.scm in the repo (`guix build -f guix.scm`).
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GNU Guix
        uses: PromyLOPh/guix-install-action@v1

      - name: Build a relocatable (-RR) binary tarball
        run: |
          set -eux
          guix pack -RR -S /bin=bin -e "(primitive-load \"$PWD/guix.scm\")" > pack.txt
          PACK="$(tail -1 pack.txt)"
          VER="$(sed -n 's/^VERSION = "\(.*\)"/\1/p' turborec.py | head -1)"
          mkdir -p out
          cp "$PACK" "out/turborec-${VER}-guix-x86_64.tar.gz"
          ls -l out

      - name: Publish Guix artifact to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.tar.gz
          fail_on_unmatched_files: true
